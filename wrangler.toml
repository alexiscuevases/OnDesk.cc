name = "pulse"
pages_build_output_dir = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "pulse-db"
database_id = "59eb1987-dd3a-49c7-add0-b69e87869ed4"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "pulse-storage"

[ai]
binding = "AI"

# Run: wrangler vectorize create ondesk-tickets --dimensions=384 --metric=cosine
# Run: wrangler vectorize create ondesk-messages --dimensions=384 --metric=cosine
# Run: wrangler vectorize create ondesk-contacts --dimensions=384 --metric=cosine
# Run: wrangler vectorize create ondesk-companies --dimensions=384 --metric=cosine

[[vectorize]]
binding = "VECTORIZE_TICKETS"
index_name = "ondesk-tickets"

[[vectorize]]
binding = "VECTORIZE_MESSAGES"
index_name = "ondesk-messages"

[[vectorize]]
binding = "VECTORIZE_CONTACTS"
index_name = "ondesk-contacts"

[[vectorize]]
binding = "VECTORIZE_COMPANIES"
index_name = "ondesk-companies"

# Run: wrangler vectorize create ondesk-memories --dimensions=384 --metric=cosine
[[vectorize]]
binding = "VECTORIZE_MEMORIES"
index_name = "ondesk-memories"

# ── Stripe secrets ────────────────────────────────────────────────────────────
# Set these via: wrangler secret put <KEY>
#
#   STRIPE_SECRET_KEY                      sk_live_...
#   STRIPE_WEBHOOK_SECRET                  whsec_...
#   STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID   price_...
#   STRIPE_PROFESSIONAL_ANNUAL_PRICE_ID    price_...
#   STRIPE_BUSINESS_MONTHLY_PRICE_ID       price_...
#   STRIPE_BUSINESS_ANNUAL_PRICE_ID        price_...
